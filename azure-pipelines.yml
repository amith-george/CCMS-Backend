trigger:
  - main

variables:
  dockerRegistryServiceConnection: 'acr-connection'
  imageRepository: 'ccms-backend'
  containerRegistry: 'amithccmsacr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  kubernetesServiceConnection: 'aks-connection'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: Build and push backend image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - script: |
        sed -i "s|#{BLOB_CONNECTION_STRING}#|$(BLOB_CONNECTION_STRING)|g" $(Build.SourcesDirectory)/k8s/backend-deployment-service.yml
      displayName: 'Replace tokens in k8s manifests'
        
    - task: KubernetesManifest@1
      displayName: Deploy to Kubernetes cluster
      inputs:
        action: deploy
        connectionType: kubernetesServiceConnection
        kubernetesServiceConnection: $(kubernetesServiceConnection)
        namespace: 'default'
        manifests: |
          $(Build.SourcesDirectory)/k8s/sqlserver-deployment-service.yml
          $(Build.SourcesDirectory)/k8s/backend-deployment-service.yml
